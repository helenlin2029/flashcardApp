<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Flashcard App</title>
    <link rel="stylesheet" href="/static/style.css" />
</head>

<body>

    <!-- Navbar -->
    <nav id="navbar">
        <div id="nav-logo">Flashcard App: STUDY</div>
        <div id="nav-links">
            <button onclick="showHome()">Home</button>
            <button id="nav-create-btn" onclick="openCreateDeck()">+ Create Deck</button>
        </div>
    </nav>

    <!-- Create Deck Modal -->
    <div id="modal-overlay" class="hidden">
        <div id="modal">
            <h2>Create New Deck</h2>
            <input type="text" id="new-deck-name" placeholder="Deck name..." />
            <div id="modal-buttons">
                <button onclick="closeCreateDeck()">Cancel</button>
                <button onclick="createDeck()">Create</button>
            </div>
        </div>
    </div>

    <!-- Home Screen -->
    <div id="home-screen" class="screen">
        <h1>My Decks</h1>
        <div id="deck-list"></div>
    </div>

    <!-- Deck Screen -->
    <div id="deck-screen" class="screen hidden">
        <div id="deck-header">
            <button class="back-btn" onclick="showHome()">← Back</button>
            <h1 id="deck-title"></h1>
        </div>

        <!-- Mode Selection -->
        <div id="mode-select">
            <h2>How would you like to study?</h2>
            <div id="mode-select-buttons">
                <div class="mode-card" onclick="showQuiz('learning')">
                    <h3>LEARNING</h3>
                    <p>Iterate through cards and select answers. Gauge your understanding.</p>
                </div>
                <div class="mode-card" onclick="showQuiz('quiz')">
                    <h3>QUIZ</h3>
                    <p>Answer multiple choice questions and get a score at the end.</p>
                </div>
            </div>
        </div>

        <div id="card-list"></div>
        <div id="add-card">
            <h3>Add a Card</h3>
            <input type="text" id="new-question" placeholder="Question..." />
            <input type="text" id="new-answer" placeholder="Answer..." />
            <button onclick="addCard()">Add Card</button>
        </div>
    </div>

    <!-- Quiz Screen -->
    <div id="quiz-screen" class="screen hidden">
        <div id="deck-header">
            <button class="back-btn" onclick="showDeck()">← Back</button>
            <h1 id="quiz-screen-title"></h1>
        </div>

        <div id="quiz-card">
            <div id="question-text"></div>
            <p id="flip-hint">Click card to flip</p>
            <div id="answer-text" class="hidden"></div>

            <div id="quiz-options" class="hidden">
                <button class="option-btn" id="option-0" onclick="event.stopPropagation(); selectOption(0)"></button>
                <button class="option-btn" id="option-1" onclick="event.stopPropagation(); selectOption(1)"></button>
                <button class="option-btn" id="option-2" onclick="event.stopPropagation(); selectOption(2)"></button>
            </div>

            <div id="learning-nav" class="hidden">
                <button onclick="event.stopPropagation(); prevCard()">← Back</button>
                <button onclick="event.stopPropagation(); nextCard()">Next →</button>
            </div>

        </div>

        <div id="quiz-complete" class="hidden">
            <h3>Complete!</h3>
            <p id="quiz-score"></p>
            <div id="results">
                <div class="result-col">
                    <h3>Correct</h3>
                    <ul id="correct-list"></ul>
                </div>
                <div class="result-col">
                    <h3>Incorrect</h3>
                    <ul id="wrong-list"></ul>
                </div>
            </div>
            <button onclick="showDeck()">Back to Deck</button>
        </div>
    </div>

    <script src="/static/script.js"></script>
</body>

</html>
