<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Flashcard App</title>
    <link rel="stylesheet" href="/static/style.css" />
</head>

<body>

    <!-- Navbar -->
    <nav id="navbar">
        <div id="nav-logo">🃏 Flashcard App</div>
        <div id="nav-links">
            <button onclick="showHome()">Home</button>
            <button id="nav-quiz-btn" class="hidden" onclick="showQuiz()">Start Quiz</button>
            <button id="nav-create-btn" onclick="openCreateDeck()">+ Create Deck</button>
        </div>
    </nav>

    <!-- Create Deck Modal -->
    <div id="modal-overlay" class="hidden">
        <div id="modal">
            <h2>Create New Deck</h2>
            <input type="text" id="new-deck-name" placeholder="Deck name..." />
            <div id="modal-buttons">
                <button onclick="closeCreateDeck()">Cancel</button>
                <button onclick="createDeck()">Create</button>
            </div>
        </div>
    </div>

    <!-- Home Screen -->
    <div id="home-screen" class="screen">
        <h1>My Decks</h1>
        <div id="deck-list"></div>
    </div>

    <!-- Deck Screen -->
    <div id="deck-screen" class="screen hidden">
        <div id="deck-header">
            <button class="back-btn" onclick="showHome()">← Back</button>
            <h1 id="deck-title"></h1>
        </div>
        <div id="card-list"></div>
        <div id="add-card">
            <h3>Add a Card</h3>
            <input type="text" id="new-question" placeholder="Question..." />
            <input type="text" id="new-answer" placeholder="Answer..." />
            <button onclick="addCard()">Add Card</button>
        </div>
    </div>

    <!-- Quiz Screen -->
    <div id="quiz-screen" class="screen hidden">
        <div id="deck-header">
            <button class="back-btn" onclick="showDeck()">← Back</button>
            <h1>Quiz: <span id="quiz-deck-title"></span></h1>
        </div>

        <!-- Mode Toggle -->
        <div id="mode-toggle">
            <button id="btn-learning" class="mode-btn active" onclick="setMode('learning')">Learning</button>
            <button id="btn-quiz" class="mode-btn" onclick="setMode('quiz')">Quiz</button>
        </div>

        <!-- Card -->
        <div id="quiz-card">
            <div id="question-text"></div>
            <p id="flip-hint">Click card to flip</p>
            <div id="answer-text" class="hidden"></div>

            <!-- Learning mode buttons -->
            <div id="learning-buttons" class="hidden">
                <button class="correct-btn" onclick="event.stopPropagation(); submitResult(true)">✅ Correct</button>
                <button class="wrong-btn" onclick="event.stopPropagation(); submitResult(false)">❌ Incorrect</button>
            </div>

            <!-- Quiz mode options -->
            <div id="quiz-options" class="hidden">
                <button class="option-btn" id="option-0" onclick="event.stopPropagation(); selectOption(0)"></button>
                <button class="option-btn" id="option-1" onclick="event.stopPropagation(); selectOption(1)"></button>
                <button class="option-btn" id="option-2" onclick="event.stopPropagation(); selectOption(2)"></button>
            </div>
        </div>

        <!-- Quiz Complete -->
        <div id="quiz-complete" class="hidden">
            <h3>🎉 Quiz Complete!</h3>
            <p id="quiz-score"></p>
            <button onclick="showDeck()">Back to Deck</button>
        </div>
    </div>

    <script src="/static/script.js"></script>
</body>

</html>
